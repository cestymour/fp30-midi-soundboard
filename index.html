    :root {
      --bg:       #0c0c0e;
      --surface:  #16161c;
      --border:   #2c2c3a;
      --txt:      #dddde8;
      --dim:      #8888a8;

      --active-border:  #2288ff;
      --active-glow:    #2288ff88;
      --active-txt:     #55aaff;

      --cat-sacre:     #ffe08a;
      --cat-western:   #ffaa55;
      --cat-medieval:  #88ddaa;
      --cat-asian:     #ff9eb5;
      --cat-jazz:      #ffcc55;
      --cat-perc:      #ffaa88;
      --cat-comedie:   #66ddcc;
      --cat-futur:     #cc88ff;
      --cat-mystere:   #6688cc;
      --cat-horreur:   #aa66ff;
      --cat-nature:    #4cffaa;
      --cat-animal:    #ffdd55;
      --cat-quotidien: #88ccff;
      --cat-vehicle:   #ff9944;
      --cat-humain:    #ff66aa;
      --cat-sfx:       #dd66ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: var(--txt);
      white-space: nowrap;
    }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .vol-wrap label {
      font-size: 0.7rem;
      color: var(--dim);
      white-space: nowrap;
      letter-spacing: 1px;
    }
    .vol-wrap input[type=range] {
      flex: 1;
      accent-color: var(--txt);
      cursor: pointer;
    }
    #volVal {
      font-size: 0.7rem;
      color: var(--txt);
      min-width: 28px;
      text-align: right;
    }

    select {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      background: var(--bg);
      color: var(--txt);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 4px;
      min-width: 180px;
    }

    #status {
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--dim);
      white-space: nowrap;
    }
    #status.ok  { color: #4cffaa; border-color: #4cffaa; }
    #status.err { color: #ff4444; border-color: #ff4444; }

    #activeLabel {
      font-size: 0.72rem;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 200px;
      flex-shrink: 0;
    }

    #activeLabel span { color: var(--active-txt); font-weight: 600; }

    /* ── Grille 4 colonnes ── */
    main {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 14px;
    }

    .column { display: flex; flex-direction: column; gap: 14px; }

    .column.sounds-start {
      border-left: 1px solid var(--border);
      padding-left: 14px;
    }

    .cat-section { display: flex; flex-direction: column; gap: 8px; }

    .cat-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
    }
    .cat-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── Bouton ── */
    .inst-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 9px 7px 8px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, box-shadow 0.12s;
      min-width: 72px;
      max-width: 95px;
      flex: 1 1 72px;
      text-align: center;
      user-select: none;
      font-family: 'IBM Plex Mono', monospace;
    }

    .inst-btn:hover { border-color: #555575; background: #1e1e2c; }

    .inst-btn .icon { font-size: 1.5rem; line-height: 1; }

    .inst-btn .name {
      font-size: 0.66rem;
      font-weight: 600;
      color: #dcdcff;
      line-height: 1.3;
    }

    /* ── État ACTIF ── */
    .inst-btn.active {
      background: var(--active-bg);
      border-color: var(--active-border);
      box-shadow: 0 0 0 2px var(--active-glow), inset 0 0 12px #0044ff18;
    }
    .inst-btn.active .name {
      color: var(--active-txt);
      font-weight: 700;
    }
    .inst-btn.active .icon { filter: drop-shadow(0 0 6px #2288ff); }

    footer {
      text-align: center;
      color: var(--dim);
      font-size: 0.6rem;
      padding: 12px;
      border-top: 1px solid var(--border);
      letter-spacing: 1px;
    }
  </style>
</head>

// MIDI
// ═══════════════════════════════════════════════════════
let midiOutput = null;
let activeBtn  = null;
let volume     = 100;

navigator.requestMIDIAccess({ sysex: false }).then(access => {
  const sel = document.getElementById('selectInterface');

  const populate = () => {
    const prev = sel.value;
    sel.innerHTML = '<option value="">— Interface MIDI —</option>';
    access.outputs.forEach(out => {
      const opt = document.createElement('option');
      opt.value = out.id;
      opt.textContent = out.name;
      if (out.id === prev) opt.selected = true;
      sel.appendChild(opt);
    });
  };

  sel.addEventListener('change', () => {
    const selectedName = sel.options[sel.selectedIndex].text;
    midiOutput = null;
    let midiInput = null;

    access.outputs.forEach(out => {
      if (out.name === selectedName) midiOutput = out;
    });
    access.inputs.forEach(inp => {
      if (inp.name === selectedName) midiInput = inp;
    });

    const st = document.getElementById('status');
    st.textContent = midiOutput ? '● Connecté' : '● Non connecté';
    st.className   = midiOutput ? 'ok' : 'err';

    if (midiInput) {
      midiInput.onmidimessage = (event) => {
        console.log('MIDI IN:', event.data);
      };
    }

    if (midiOutput) sendVolume(volume);
  });

  // populate() et auto-sélection APRÈS que le listener soit branché
  populate();
  if (sel.options.length === 2) {
    sel.selectedIndex = 1;
    sel.dispatchEvent(new Event('change'));
  }

  access.onstatechange = () => {
    populate();
    if (sel.options.length === 2 && sel.selectedIndex === 0) {
      sel.selectedIndex = 1;
      sel.dispatchEvent(new Event('change'));
    }
  };

}, () => {
  const st = document.getElementById('status');
  st.textContent = '● MIDI refusé';
  st.className = 'err';
});

function sendVolume(val) {
  if (midiOutput)
    midiOutput.send([0xB0, 0x07, val]); // CC7 Volume ch.1
}

document.getElementById('volSlider').addEventListener('input', function() {
  volume = parseInt(this.value);
  document.getElementById('volVal').textContent = volume;
  sendVolume(volume);
});

function selectInstrument(btn, inst) {
  if (activeBtn) activeBtn.classList.remove('active');
  activeBtn = btn;
  btn.classList.add('active');

  document.getElementById('activeLabel').innerHTML =
    `Actif : <span>${inst.name}</span>`;

  if (midiOutput) {
    midiOutput.send([0xB0, 0x00, inst.msb]); // Bank Select MSB
    midiOutput.send([0xB0, 0x20, inst.lsb]); // Bank Select LSB
    midiOutput.send([0xC0, inst.pc - 1]);     // Program Change (base 0)
  }
}

// ═══════════════════════════════════════════════════════
// CONSTRUCTION DE L'INTERFACE
// ═══════════════════════════════════════════════════════
const board = document.getElementById('board');
const cols  = [0,1,2,3].map(() => {
  const c = document.createElement('div');
  c.className = 'column';
  board.appendChild(c);
  return c;
});

cols[2].classList.add('sounds-start');

COLUMNS.forEach(colDef => {
  const col = cols[colDef.col];
  colDef.categories.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'cat-section';

    const title = document.createElement('div');
    title.className = 'cat-title';
    title.style.color = cat.color;
    title.textContent = cat.label;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'btn-grid';

    cat.instruments.forEach(inst => {
      const btn = document.createElement('button');
      btn.className = 'inst-btn';
      btn.title = inst.title;
      btn.innerHTML = `<span class="icon">${inst.icon}</span><span class="name">${inst.name}</span>`;
      btn.addEventListener('click', () => selectInstrument(btn, inst));
      grid.appendChild(btn);
    });

    section.appendChild(grid);
    col.appendChild(section);
  });
});
</script>
</body>
</html>
