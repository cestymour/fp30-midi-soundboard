<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>🎭 IMPRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════════
       HEADER — logo + onglets
  ════════════════════════════════════════ -->
  <header id="header">
    <div id="logo">
      <span class="logo-bracket">[</span>
      <span class="logo-text">IMPRO</span>
      <span class="logo-bracket">]</span>
    </div>
    <nav id="tab-nav">
      <!-- Généré dynamiquement par JS -->
    </nav>
  </header>

  <!-- ═══════════════════════════════════════
       PANNEAUX — générés dynamiquement
  ════════════════════════════════════════ -->
  <main id="panels">
    <!-- Généré dynamiquement par JS -->
  </main>

</div>

<!-- Données -->
<script src="midi.config.js"></script>
<script src="audio.config.js"></script>

<!-- Bibliothèques MIDI BT -->
<script src="ble-midi-parser.bundle.js"></script>
<script src="bluetoothMIDI.js"></script>

<script>
(() => {
  'use strict';

  // ═══════════════════════════════════════════════════════
  // ÉTAT GLOBAL
  // ═══════════════════════════════════════════════════════
  const tabNav   = document.getElementById('tab-nav');
  const panelsEl = document.getElementById('panels');

  let allTabs      = [];   // { type:'midi'|'audio', accent, ...données }
  let activeTabIdx = 0;

  // ─── MIDI ───
  let midiOutput  = null;
  let midiInput   = null;
  let midiAccess  = null;
  let activeInstBtn = null;
  let midiVolume  = 100;
  let currentConnectionType = null;
  let isSwitchingToUsb = false;
  const MIDI_CHANNEL = 0;

  // ─── Audio ───
  let currentAudio   = null;
  let currentSoundBtn = null;
  let progressRAF    = null;
  let audioVolume    = 0.75;

  // ═══════════════════════════════════════════════════════
  // CONSTRUCTION DES ONGLETS (MIDI + Audio fusionnés)
  // ═══════════════════════════════════════════════════════

  // Fusionner MIDI_TABS et AUDIO_TABS dans un tableau unique
  // en ajoutant le type pour distinguer les deux
  MIDI_TABS.forEach(tab  => allTabs.push({ ...tab,  type: 'midi'  }));
  AUDIO_TABS.forEach(tab => allTabs.push({ ...tab, type: 'audio' }));

  // ─── Séparateur entre MIDI et Audio ───
  // On repère l'index du premier onglet audio pour insérer le séparateur dans le nav
  const firstAudioIdx = MIDI_TABS.length;

  // ═══════════════════════════════════════════════════════
  // CONSTRUCTION DU DOM
  // ═══════════════════════════════════════════════════════
  function buildUI() {
    allTabs.forEach((tab, idx) => {

      // ── Séparateur visuel avant le 1er onglet Audio ──
      if (idx === firstAudioIdx) {
        const sep = document.createElement('div');
        sep.className = 'tab-separator';
        tabNav.appendChild(sep);
      }

      // ── Onglet ──
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
      btn.dataset.tab = idx;
      btn.dataset.type = tab.type;
      btn.style.setProperty('--tab-accent', tab.accent);
      btn.innerHTML = `
        <span class="tab-icon">${tab.icon}</span>
        <span class="tab-label">${tab.label}</span>
      `;
      tabNav.appendChild(btn);

      // ── Panneau ──
      const panel = document.createElement('section');
      panel.className = `panel panel-${tab.type}` + (idx === 0 ? ' active' : '');
      panel.dataset.panel = idx;
      panel.dataset.type  = tab.type;
      panel.style.setProperty('--panel-accent', tab.accent);

      if (tab.type === 'midi') {
        panel.appendChild(buildMidiControls(idx));
        panel.appendChild(buildMidiGrid(tab));
      } else {
        panel.appendChild(buildAudioControls(idx));
        panel.appendChild(buildAudioGrid(tab));
      }

      panelsEl.appendChild(panel);
    });
  }

  // ─── Contrôles MIDI ───
  function buildMidiControls(panelIdx) {
    const wrap = document.createElement('div');
    wrap.className = 'panel-controls';
    wrap.innerHTML = `
      <div class="midi-connect">
        <select class="midi-select" id="midiSelect-${panelIdx}">
          <option value="__none__">— Connexion MIDI —</option>
        </select>
        <span class="midi-badge" id="midiBadge-${panelIdx}">Non connecté</span>
      </div>
      <div class="volume-wrap">
        <span class="vol-icon">🔊</span>
        <input type="range" class="vol-slider midi-vol" min="0" max="127" value="100"
               style="--vol-pct:${(100/127*100).toFixed(1)}%" />
        <span class="vol-value">100</span>
      </div>
    `;

    // Événement volume MIDI
    const slider = wrap.querySelector('.midi-vol');
    const valEl  = wrap.querySelector('.vol-value');
    slider.addEventListener('input', () => {
      midiVolume = parseInt(slider.value, 10);
      const pct  = (midiVolume / 127 * 100).toFixed(1);
      slider.style.setProperty('--vol-pct', pct + '%');
      valEl.textContent = midiVolume;
      updateVolIcon(wrap.querySelector('.vol-icon'), midiVolume, 127);
      sendVolume(midiVolume);
      // Synchroniser tous les sliders MIDI
      syncMidiSliders(midiVolume);
    });

    return wrap;
  }

  // ─── Contrôles Audio ───
  function buildAudioControls(panelIdx) {
    const wrap = document.createElement('div');
    wrap.className = 'panel-controls';
    const pct = (audioVolume * 100).toFixed(1);
    wrap.innerHTML = `
      <div class="now-playing">
        <span class="now-playing-label">NO SOUND PLAYING</span>
        <span class="now-playing-dot"></span>
      </div>
      <div class="volume-wrap">
        <span class="vol-icon">🔊</span>
        <input type="range" class="vol-slider audio-vol" min="0" max="100" value="75"
               style="--vol-pct:${pct}%" />
        <span class="vol-value">75%</span>
      </div>
    `;

    // Événement volume Audio
    const slider = wrap.querySelector('.audio-vol');
    const valEl  = wrap.querySelector('.vol-value');
    slider.addEventListener('input', () => {
      audioVolume = parseInt(slider.value, 10) / 100;
      const p = (audioVolume * 100).toFixed(1);
      slider.style.setProperty('--vol-pct', p + '%');
      valEl.textContent = Math.round(audioVolume * 100) + '%';
      updateVolIcon(wrap.querySelector('.vol-icon'), audioVolume * 100, 100);
      if (currentAudio) currentAudio.volume = audioVolume;
      // Synchroniser tous les sliders Audio
      syncAudioSliders(Math.round(audioVolume * 100));
    });

    return wrap;
  }

  // ─── Grille MIDI ───
  function buildMidiGrid(tab) {
    const grid = document.createElement('div');
    grid.className = 'midi-grid';

    tab.categories.forEach(cat => {
      const block = document.createElement('div');
      block.className = 'cat-block';

      const title = document.createElement('div');
      title.className = 'cat-title';
      title.style.setProperty('--cat-color', cat.color ?? 'var(--text-muted)');
      title.textContent = `${cat.icon ?? ''} ${cat.label}`;
      block.appendChild(title);

      const btnGrid = document.createElement('div');
      btnGrid.className = 'btn-grid';

      cat.items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'inst-btn';
        btn.title     = item.title ?? item.name;
        btn.innerHTML = `
          <span class="btn-icon">${item.icon}</span>
          <span class="btn-label">${item.name}</span>
        `;
        btn.addEventListener('click', () => selectInstrument(btn, item));
        btnGrid.appendChild(btn);
      });

      block.appendChild(btnGrid);
      grid.appendChild(block);
    });

    return grid;
  }

  // ─── Grille Audio ───
  function buildAudioGrid(tab) {
    const grid = document.createElement('div');
    grid.className = 'audio-grid';

    tab.categories.forEach(cat => {
      cat.items.forEach(item => {
        const btn = document.createElement('button');
        btn.className     = 'sound-btn';
        btn.dataset.audio = item.file;
        btn.dataset.label = item.name;
        btn.style.setProperty('--progress', '0%');

        const isImage = item.icon && /\.(png|jpg|jpeg|gif|svg|webp)$/i.test(item.icon);
        const iconHTML = isImage
          ? `<span class="btn-icon"><img src="${item.icon}" alt="${item.name}" /></span>`
          : `<span class="btn-icon">${item.icon ?? '▶'}</span>`;

        btn.innerHTML = `${iconHTML}<span class="btn-label">${item.name}</span>`;
        btn.addEventListener('click', () => {
          btn === currentSoundBtn ? stopSound(true) : (stopSound(true), playSound(btn));
        });
        grid.appendChild(btn);
      });
    });

    return grid;
  }

  // ═══════════════════════════════════════════════════════
  // NAVIGATION ONGLETS
  // ═══════════════════════════════════════════════════════
  tabNav.addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    activateTab(parseInt(btn.dataset.tab, 10));
  });

  function activateTab(idx) {
    activeTabIdx = idx;
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', i === idx));
    document.querySelectorAll('.panel').forEach((p, i) =>
      p.classList.toggle('active', i === idx));
  }

  // ═══════════════════════════════════════════════════════
  // UTILITAIRES UI
  // ═══════════════════════════════════════════════════════
  function updateVolIcon(el, val, max) {
    const pct = val / max * 100;
    if (pct === 0)      el.textContent = '🔇';
    else if (pct < 35)  el.textContent = '🔈';
    else if (pct < 70)  el.textContent = '🔉';
    else                el.textContent = '🔊';
  }

  function syncMidiSliders(val) {
    document.querySelectorAll('.midi-vol').forEach(s => {
      if (parseInt(s.value) === val) return;
      s.value = val;
      s.style.setProperty('--vol-pct', (val / 127 * 100).toFixed(1) + '%');
      s.closest('.panel-controls').querySelector('.vol-value').textContent = val;
    });
  }

  function syncAudioSliders(pct) {
    document.querySelectorAll('.audio-vol').forEach(s => {
      if (parseInt(s.value) === pct) return;
      s.value = pct;
      s.style.setProperty('--vol-pct', pct + '%');
      s.closest('.panel-controls').querySelector('.vol-value').textContent = pct + '%';
    });
  }

  // ═══════════════════════════════════════════════════════
  // MIDI — Envoi
  // ═══════════════════════════════════════════════════════
  function sendMidi(bytes) {
    if (midiOutput)           midiOutput.send(bytes);
    else if (bt?.status === 'connected') bt.send(bytes);
    else console.warn('Pas de connexion MIDI active');
  }

  function sendInstrumentPatch(item) {
    sendMidi([0xB0 | MIDI_CHANNEL, 0x00, item.msb]);
    sendMidi([0xB0 | MIDI_CHANNEL, 0x20, item.lsb]);
    sendMidi([0xC0 | MIDI_CHANNEL, item.pc - 1]);
  }

  function sendVolume(val) {
    sendMidi([0xB0 | MIDI_CHANNEL, 0x07, val]);
  }

  // ═══════════════════════════════════════════════════════
  // MIDI — Sélection instrument
  // ═══════════════════════════════════════════════════════
  function selectInstrument(btn, item) {
    if (activeInstBtn) activeInstBtn.classList.remove('active');
    activeInstBtn = btn;
    btn.classList.add('active');
    sendInstrumentPatch(item);
  }

  // ═══════════════════════════════════════════════════════
  // MIDI — Badge statut (synchronise tous les panneaux MIDI)
  // ═══════════════════════════════════════════════════════
  function updateAllMidiBadges() {
    document.querySelectorAll('.midi-badge').forEach(badge => {
      if (currentConnectionType === 'usb') {
        badge.textContent = '● USB';
        badge.className   = 'midi-badge usb';
      } else if (currentConnectionType === 'bt') {
        badge.textContent = '● BT';
        badge.className   = 'midi-badge bt';
      } else {
        badge.textContent = 'Non connecté';
        badge.className   = 'midi-badge';
      }
    });
  }

  function updateAllMidiSelects(val) {
    document.querySelectorAll('.midi-select').forEach(s => { s.value = val; });
  }

  // ═══════════════════════════════════════════════════════
  // BLUETOOTH MIDI
  // ═══════════════════════════════════════════════════════
  const bt = new BluetoothMIDI({
    onStatusChange: (status) => {
      if (status === 'connected') {
        if (midiOutput) { midiOutput = null; }
        currentConnectionType = 'bt';
        updateAllMidiSelects('__bluetooth__');
        updateAllMidiBadges();
        sendVolume(midiVolume);
      } else if (status === 'idle' || status === 'error') {
        if (isSwitchingToUsb) return;
        if (currentConnectionType === 'bt') {
          currentConnectionType = null;
          updateAllMidiBadges();
        }
        if (midiOutput) {
          updateAllMidiSelects(midiOutput.id);
        } else {
          updateAllMidiSelects('__none__');
        }
      }
    },
  });

  // ═══════════════════════════════════════════════════════
  // WEB MIDI (USB)
  // ═══════════════════════════════════════════════════════
  navigator.requestMIDIAccess({ sysex: false }).then(access => {
    midiAccess = access;
    populateMidiSelects(true);
    access.onstatechange = () => populateMidiSelects(false);
  }, () => {
    currentConnectionType = null;
    updateAllMidiBadges();
  });

  function populateMidiSelects(isFirstLoad = false) {
    const usbOutputs = [];
    if (midiAccess) midiAccess.outputs.forEach(o => usbOutputs.push(o));

    document.querySelectorAll('.midi-select').forEach((sel, selIdx) => {
      const prev = sel.value;
      sel.innerHTML = '';

      const noneOpt = document.createElement('option');
      noneOpt.value = '__none__';
      noneOpt.textContent = '— Connexion MIDI —';
      sel.appendChild(noneOpt);

      if (navigator.bluetooth) {
        const btOpt = document.createElement('option');
        btOpt.value = '__bluetooth__';
        btOpt.textContent = 'ᛒ Bluetooth MIDI';
        sel.appendChild(btOpt);
      }

      usbOutputs.forEach(out => {
        const opt = document.createElement('option');
        opt.value = out.id;
        opt.textContent = '🎹 ' + out.name;
        sel.appendChild(opt);
      });

      // Restaurer la valeur
      if (currentConnectionType === 'bt') {
        sel.value = '__bluetooth__';
      } else if (currentConnectionType === 'usb' && midiOutput) {
        sel.value = midiOutput.id;
      } else if (isFirstLoad && selIdx === 0) {
        // Auto-sélection piano sur premier select uniquement
        const pianoOpt = Array.from(sel.options).find(
          o => o.value !== '__none__' && o.value !== '__bluetooth__'
            && o.textContent.toLowerCase().includes('piano')
        );
        if (pianoOpt) {
          sel.value = pianoOpt.value;
          sel.dispatchEvent(new Event('change'));
        } else {
          sel.value = '__none__';
        }
      } else {
        sel.value = prev || '__none__';
      }
    });
  }

  function disconnectMidiInput() {
    if (midiInput) { midiInput.onmidimessage = null; midiInput = null; }
  }

  // Délégation sur le panneau : écoute tous les selects MIDI
  panelsEl.addEventListener('change', async e => {
    if (!e.target.classList.contains('midi-select')) return;
    const val = e.target.value;

    // Synchroniser tous les selects MIDI sur la même valeur
    updateAllMidiSelects(val);

    if (val === '__none__') {
      if (bt?.status === 'connected') bt.disconnect();
      disconnectMidiInput();
      midiOutput = null;
      currentConnectionType = null;
      updateAllMidiBadges();

    } else if (val === '__bluetooth__') {
      const prevOutput = midiOutput;
      const prevId     = prevOutput?.id ?? null;
      if (midiOutput) { disconnectMidiInput(); midiOutput = null; }
      if (bt?.status !== 'connected') {
        await bt.connect();
        if (bt?.status !== 'connected') {
          // Annulation — restaurer USB si possible
          if (prevOutput && prevId) {
            midiOutput = prevOutput;
            currentConnectionType = 'usb';
            updateAllMidiSelects(prevId);
          } else {
            currentConnectionType = null;
            updateAllMidiSelects('__none__');
          }
          updateAllMidiBadges();
        }
      }

    } else {
      // USB
      isSwitchingToUsb = true;
      if (bt?.status === 'connected') bt.disconnect();
      disconnectMidiInput();
      midiOutput = null;

      midiAccess.outputs.forEach(out => { if (out.id === val) midiOutput = out; });
      midiAccess.inputs.forEach(inp => {
        if (inp.name === midiOutput?.name) midiInput = inp;
      });

      if (midiInput) {
        midiInput.onmidimessage = event => {
          if (midiOutput) midiOutput.send(event.data);
        };
      }

      currentConnectionType = midiOutput ? 'usb' : null;
      isSwitchingToUsb = false;
      updateAllMidiBadges();
      if (midiOutput) sendVolume(midiVolume);
    }
  });

  // ═══════════════════════════════════════════════════════
  // AUDIO — Lecture
  // ═══════════════════════════════════════════════════════
  function updateNowPlaying(text) {
    document.querySelectorAll('.panel-audio.active .now-playing-label')
      .forEach(el => el.textContent = text);
  }

  function stopSound(fade = false) {
    if (progressRAF) { cancelAnimationFrame(progressRAF); progressRAF = null; }

    if (currentSoundBtn) {
      currentSoundBtn.classList.remove('playing');
      currentSoundBtn.style.setProperty('--progress', '0%');
      currentSoundBtn = null;
    }

    document.querySelectorAll('.panel-audio').forEach(p => p.classList.remove('is-playing'));
    updateNowPlaying('NO SOUND PLAYING');

    if (!currentAudio) return;

    if (fade) {
      const audio = currentAudio;
      currentAudio = null;
      fadeAudio(audio, audio.volume, 0, 400, () => { audio.pause(); audio.currentTime = 0; });
    } else {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
  }

  function playSound(btn) {
    const src = btn.dataset.audio;
    if (!src) return;

    const audio = new Audio(src);
    audio.volume = 0;

    audio.addEventListener('canplaythrough', () => {
      audio.play().then(() => {
        fadeAudio(audio, 0, audioVolume, 300, null);
        startProgressLoop(audio, btn);
      }).catch(() => stopSound());
    }, { once: true });

    audio.addEventListener('ended', () => stopSound(false), { once: true });
    audio.addEventListener('error', () => {
      btn.classList.add('missing');
      stopSound();
    }, { once: true });

    currentAudio    = audio;
    currentSoundBtn = btn;
    btn.classList.add('playing');
    btn.style.setProperty('--progress', '0%');

    // Marquer le panneau actif comme "is-playing"
    btn.closest('.panel-audio')?.classList.add('is-playing');
    updateNowPlaying('▶ ' + (btn.dataset.label || 'EN LECTURE'));

    audio.load();
  }

  function startProgressLoop(audio, btn) {
    function tick() {
      if (!currentAudio || !currentSoundBtn) return;
      const dur = audio.duration;
      const pct = (dur && isFinite(dur))
        ? Math.min(100, (audio.currentTime / dur) * 100).toFixed(1) + '%'
        : '0%';
      btn.style.setProperty('--progress', pct);
      progressRAF = requestAnimationFrame(tick);
    }
    if (progressRAF) cancelAnimationFrame(progressRAF);
    progressRAF = requestAnimationFrame(tick);
  }

  function fadeAudio(audio, from, to, ms, onDone) {
    const steps    = 20;
    const interval = ms / steps;
    const delta    = (to - from) / steps;
    let current    = from;
    const timer    = setInterval(() => {
      current += delta;
      audio.volume = Math.min(1, Math.max(0, current));
      if ((delta < 0 && current <= to) || (delta > 0 && current >= to)) {
        clearInterval(timer);
        onDone?.();
      }
    }, interval);
    return timer;
  }

  // ═══════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════
  if (typeof MIDI_TABS === 'undefined' || typeof AUDIO_TABS === 'undefined') {
    panelsEl.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;
        height:100%;color:#ff3d71;font-family:'IBM Plex Mono',monospace;
        font-size:13px;text-align:center;padding:20px;">
        ⚠️ <strong>MIDI_TABS</strong> ou <strong>AUDIO_TABS</strong> introuvable.<br>
        Vérifiez que <strong>tones.js</strong> et <strong>sounds.config.js</strong> sont chargés.
      </div>`;
  } else {
    buildUI();
  }

})();
</script>
</body>
</html>
