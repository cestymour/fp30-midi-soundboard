<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎭 Impro — Instruments & Sons</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎭 IMPRO</h1>
  <div class="vol-wrap">
    <label>VOL</label>
    <input type="range" id="volSlider" min="0" max="127" value="100">
    <span id="volVal">100</span>
  </div>
  <div class="connexion-wrap">
    <select id="midiSelect"></select>
    <span id="status">Non connecté</span>
  </div>
  <div id="activeLabel">Actif : <span>—</span></div>
</header>

<main id="board"></main>

<footer>FP-30X · Ch.1 · Clic = sélection · Jouer au piano</footer>

<script src="ble-midi-parser.bundle.js"></script>
<script src="bluetoothMIDI.js"></script>
<script src="tones.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// CONSTANTES MIDI
// ═══════════════════════════════════════════════════════
// Canal MIDI 1 (0 en notation binaire, les messages MIDI sont 0-indexed)
const MIDI_CHANNEL = 0;

// ═══════════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════════
let midiOutput = null;
let midiInput  = null; // gardé en module pour nettoyage lors des changements
let activeBtn  = null;
let volume     = 100;
let currentConnectionType = null; // 'usb' | 'bt' | null

// ═══════════════════════════════════════════════════════
// MIDI — Routage & Envoi
// ═══════════════════════════════════════════════════════

// Envoie les octets MIDI vers la connexion active (USB en priorité, sinon BT).
function sendMidi(bytes) {
  if (midiOutput) {
    midiOutput.send(bytes);
  } else if (bt.status === 'connected') {
    bt.send(bytes);
  } else {
    console.error('PAS de connexion MIDI active !');
  }
}

// Envoie le patch complet (Bank MSB, Bank LSB, Program Change) pour un instrument.
// Les PC dans les données sont en notation musicale (1–128) ; MIDI attend 0–127, d'où le -1.
function sendInstrumentPatch(inst) {
  sendMidi([0xB0 | MIDI_CHANNEL, 0x00, inst.msb]); // CC0  Bank Select MSB
  sendMidi([0xB0 | MIDI_CHANNEL, 0x20, inst.lsb]); // CC32 Bank Select LSB
  sendMidi([0xC0 | MIDI_CHANNEL, inst.pc - 1]);     // Program Change (0-indexed)
}

function sendVolume(val) {
  sendMidi([0xB0 | MIDI_CHANNEL, 0x07, val]); // CC7 Volume
}

// ═══════════════════════════════════════════════════════
// BLUETOOTH MIDI
// ═══════════════════════════════════════════════════════
const bt = new BluetoothMIDI({
  onStatusChange: (status, error) => {
    if (status === 'connected') {
      // Déconnecter USB si actif
      if (midiOutput) {
        console.log('Switch USB → BT : déconnexion USB');
        midiOutput = null;
      }
      currentConnectionType = 'bt';
      // Mettre à jour la sélection dans le select sans déclencher le handler
      midiSelect.value = '__bluetooth__';
      updateStatusBadge();
      sendVolume(volume);
    } else if (status === 'idle' || status === 'error') {
      // Ne pas interférer si on est en train de basculer vers USB
      if (isSwitchingToUsb) return;

      if (currentConnectionType === 'bt') {
        currentConnectionType = null;
        updateStatusBadge();
      }
      // Resynchroniser le select sur la connexion réelle
      if (midiOutput) {
        const usbOpt = Array.from(midiSelect.options).find(o => o.text === '🎹 ' + midiOutput.name);
        midiSelect.value = usbOpt ? usbOpt.value : '__none__';
      } else {
        midiSelect.value = '__none__';
      }
    }
  },
});

// ═══════════════════════════════════════════════════════
// WEB MIDI (USB filaire)
// ═══════════════════════════════════════════════════════
let midiAccess = null;
const midiSelect = document.getElementById('midiSelect');

navigator.requestMIDIAccess({ sysex: false }).then(access => {
  midiAccess = access;
  populateMidiSelect(true); // true = premier chargement → auto-sélection piano
  access.onstatechange = () => populateMidiSelect(false);
}, () => {
  currentConnectionType = null;
  updateStatusBadge(true); // true = forcer l'affichage erreur
});

function populateMidiSelect(isFirstLoad = false) {
  const prev = midiSelect.value;

  // Recenser les sorties USB disponibles
  const usbOutputs = [];
  if (midiAccess) {
    midiAccess.outputs.forEach(out => usbOutputs.push(out));
  }

  midiSelect.innerHTML = '';

  // Option "Sélectionner une connexion" — toujours présente en premier
  const noneOpt = document.createElement('option');
  noneOpt.value = '__none__';
  noneOpt.textContent = '— Sélectionner une connexion —';
  midiSelect.appendChild(noneOpt);

  // Option Bluetooth (si supporté)
  if (navigator.bluetooth) {
    const btOpt = document.createElement('option');
    btOpt.value = '__bluetooth__';
    btOpt.textContent = '>ᛒ Bluetooth MIDI';
    midiSelect.appendChild(btOpt);
  }

  // Options USB (avec emoji prise)
  usbOutputs.forEach(out => {
    const opt = document.createElement('option');
    opt.value = out.id;
    opt.textContent = '🎹 ' + out.name;
    midiSelect.appendChild(opt);
  });

  // ── Restaurer / auto-sélectionner ──
  if (currentConnectionType === 'bt') {
    // BT actif : maintenir la sélection BT
    midiSelect.value = '__bluetooth__';
  } else if (currentConnectionType === 'usb' && prev) {
    // USB actif : vérifier que l'option existe encore
    const stillExists = Array.from(midiSelect.options).some(o => o.value === prev);
    if (stillExists) {
      midiSelect.value = prev;
    } else {
      // Le périphérique USB a disparu (débranché)
      disconnectMidiInput();
      midiOutput = null;
      currentConnectionType = null;
      updateStatusBadge();
      midiSelect.value = '__none__';
    }
  } else if (isFirstLoad) {
    // Premier chargement : chercher un périphérique contenant "piano" (insensible à la casse)
    const pianoOpt = Array.from(midiSelect.options).find(
      o => o.value !== '__none__' && o.value !== '__bluetooth__' && o.textContent.toLowerCase().includes('piano')
    );
    if (pianoOpt) {
      midiSelect.value = pianoOpt.value;
      midiSelect.dispatchEvent(new Event('change'));
    } else {
      midiSelect.value = '__none__';
    }
  } else {
    midiSelect.value = '__none__';
  }
}

// Détache proprement le listener de l'entrée MIDI précédente.
function disconnectMidiInput() {
  if (midiInput) {
    midiInput.onmidimessage = null;
    midiInput = null;
  }
}

midiSelect.addEventListener('change', async () => {
  const val = midiSelect.value;

  if (val === '__none__') {
    // Déconnexion totale
    if (bt.status === 'connected') bt.disconnect();
    disconnectMidiInput();
    midiOutput = null;
    currentConnectionType = null;
    updateStatusBadge();
  } else if (val === '__bluetooth__') {
    // Sauvegarder l'état USB avant de tenter le BT
    const prevUsbOutput = midiOutput;
    const prevUsbId     = midiOutput
      ? Array.from(midiSelect.options).find(o => o.textContent === '🎹 ' + midiOutput.name)?.value
      : null;

    // Déconnecter USB si actif
    if (midiOutput) {
      console.log('Switch USB → BT : déconnexion USB');
      disconnectMidiInput();
      midiOutput = null;
    }
    // Connecter BT si pas déjà connecté
    if (bt.status !== 'connected') {
      await bt.connect();
      // Si l'utilisateur a annulé le dialog ou erreur → restaurer USB si possible
      if (bt.status !== 'connected') {
        if (prevUsbOutput && prevUsbId) {
          // Retour sur la connexion USB précédente
          midiOutput = prevUsbOutput;
          currentConnectionType = 'usb';
          midiSelect.value = prevUsbId;
          updateStatusBadge();
          console.log('Annulation BT → retour USB :', prevUsbOutput.name);
        } else {
          // Pas d'USB précédent → retour sur "Sélectionner une connexion"
          currentConnectionType = null;
          midiSelect.value = '__none__';
          updateStatusBadge();
        }
      }
    }
  } else {
    // ── Connexion USB ──
    isSwitchingToUsb = true; // poser le flag AVANT disconnect BT
    if (bt.status === 'connected') {
      console.log('Switch BT → USB : déconnexion BT');
      bt.disconnect();
    }

    disconnectMidiInput();
    midiOutput = null;

    midiAccess.outputs.forEach(out => {
      if (out.id === val) midiOutput = out;
    });

    // Chercher l'entrée correspondante (même nom) pour le loopback
    midiAccess.inputs.forEach(inp => {
      if (inp.name === midiOutput?.name) midiInput = inp;
    });

    if (midiInput) {
      midiInput.onmidimessage = (event) => {
        console.log('MIDI IN:', event.data);
        if (midiOutput) {
          // Très important, cette ligne corriger le problème d'envoi du signal
          midiOutput.send(event.data); // loopback
        }
      };
    }

    currentConnectionType = midiOutput ? 'usb' : null;
    isSwitchingToUsb = false; // relâcher le flag APRÈS configuration complète
    updateStatusBadge();
    if (midiOutput) sendVolume(volume);
  }
});

// ═══════════════════════════════════════════════════════
// UI — Badge de statut
// ═══════════════════════════════════════════════════════
function updateStatusBadge(isError = false) {
  const badge = document.getElementById('status');
  if (isError) {
    badge.textContent = '● MIDI refusé';
    badge.className = 'err';
  } else if (currentConnectionType === 'usb') {
    badge.textContent = '● USB';
    badge.className = 'usb';
  } else if (currentConnectionType === 'bt') {
    badge.textContent = '● BT';
    badge.className = 'bt';
  } else {
    badge.textContent = 'Non connecté';
    badge.className = '';
  }
}

// ═══════════════════════════════════════════════════════
// UI — Volume
// ═══════════════════════════════════════════════════════
document.getElementById('volSlider').addEventListener('input', function() {
  volume = parseInt(this.value);
  document.getElementById('volVal').textContent = volume;
  sendVolume(volume);
});

// ═══════════════════════════════════════════════════════
// UI — Sélection instrument
// ═══════════════════════════════════════════════════════
function selectInstrument(btn, inst) {
  if (activeBtn) activeBtn.classList.remove('active');
  activeBtn = btn;
  btn.classList.add('active');

  document.getElementById('activeLabel').innerHTML =
    `Actif : <span>${inst.name}</span>`;

  console.log('Envoi MIDI:', inst.name, '| MSB:', inst.msb, '| LSB:', inst.lsb, '| PC:', inst.pc - 1);
  sendInstrumentPatch(inst);
}

// ═══════════════════════════════════════════════════════
// CONSTRUCTION DE L'INTERFACE
// ═══════════════════════════════════════════════════════
const board = document.getElementById('board');
const cols  = [0,1,2,3].map(() => {
  const c = document.createElement('div');
  c.className = 'column';
  board.appendChild(c);
  return c;
});

// Séparateur visuel entre instruments (col 0-1) et sons (col 2-3)
cols[2].classList.add('sounds-start');

COLUMNS.forEach(colDef => {
  const col = cols[colDef.col];
  colDef.categories.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'cat-section';

    const title = document.createElement('div');
    title.className = 'cat-title';
    title.style.color = cat.color;
    title.textContent = cat.label;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'btn-grid';

    cat.instruments.forEach(inst => {
      const btn = document.createElement('button');
      btn.className = 'inst-btn';
      btn.title = inst.title;
      btn.innerHTML = `<span class="icon">${inst.icon}</span><span class="name">${inst.name}</span>`;
      btn.addEventListener('click', () => selectInstrument(btn, inst));
      grid.appendChild(btn);
    });

    section.appendChild(grid);
    col.appendChild(section);
  });
});
</script>
</body>
</html>
