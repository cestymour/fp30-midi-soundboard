<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SoundBoard" />

  <title>Piano Soundboard</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="public/favicon.ico" />
  <link rel="apple-touch-icon" href="public/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════════
       HEADER — onglets + bouton settings
  ════════════════════════════════════════ -->
  <header id="header">
    <nav id="tab-nav">
      <!-- Généré dynamiquement par JS -->
    </nav>
    <button id="settings-btn" title="Paramètres">⚙</button>
  </header>

  <!-- ═══════════════════════════════════════
       PANNEAUX — générés dynamiquement
  ════════════════════════════════════════ -->
  <main id="panels">
    <!-- Généré dynamiquement par JS -->
  </main>

</div>

<!-- Version -->
<script src="version.js"></script>

<!-- Données -->
<script src="midi.config.js"></script>
<script src="audio.config.js"></script>

<!-- Bibliothèques MIDI BT -->
<script src="js/ble-midi-parser.bundle.js"></script>
<script src="js/bluetoothMIDI.js"></script>

<!-- Onglets -->
<script src="js/midi.js"></script>
<script src="js/audio.js"></script>

<!-- Principal -->
<script src="js/app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[PWA] Service Worker enregistré :', reg.scope))
        .catch(err => console.warn('[PWA] Échec enregistrement SW :', err));
    });
  }
</script>
</body>
</html>
